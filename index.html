<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🏡 小机家</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Quicksand', system-ui, -apple-system, sans-serif;
            background: #f7efe8;
            color: #4a3729;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ===== 页面容器 ===== */
        .page {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            max-width: 430px;
            margin: 0 auto;
            background: #fcf6f0;
            box-shadow: 0 0 60px rgba(160, 120, 80, 0.12);
            position: relative;
            overflow: hidden;
            border-radius: 0;
        }
        .page.active {
            display: flex;
        }

        /* ===== 滚动条美化 ===== */
        .page-body::-webkit-scrollbar,
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .page-body::-webkit-scrollbar-track,
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(200, 170, 140, 0.15);
            border-radius: 8px;
        }
        .page-body::-webkit-scrollbar-thumb,
        .chat-messages::-webkit-scrollbar-thumb {
            background: #e8c8b0;
            border-radius: 8px;
        }

        /* ============================================================
                   主页
                   ============================================================ */
        #homePage {
            justify-content: space-between;
            align-items: center;
            padding: 0;
            background: linear-gradient(165deg, #fdf3e8 0%, #fae8d8 40%, #f5dcc8 100%);
            position: relative;
        }

        /* 主页装饰 — 浮动光晕 (保留) */
        #homePage::before {
            content: '';
            position: absolute;
            top: -10%;
            right: -20%;
            width: 70%;
            height: 70%;
            background: radial-gradient(circle, rgba(245, 180, 140, 0.25) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        #homePage::after {
            content: '';
            position: absolute;
            bottom: 10%;
            left: -15%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(240, 200, 170, 0.20) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .home-bg {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        /* 浮动装饰 (小花、咖啡、星星) 保留 */
        .home-deco {
            position: absolute;
            font-size: 1.6em;
            opacity: 0.5;
            user-select: none;
            pointer-events: none;
            animation: floatDeco 6s ease-in-out infinite alternate;
        }
        .home-deco:nth-child(1) {
            top: 12%;
            left: 10%;
            animation-delay: 0s;
            font-size: 1.8em;
            opacity: 0.4;
        }
        .home-deco:nth-child(2) {
            top: 25%;
            right: 12%;
            animation-delay: 1.5s;
            font-size: 1.4em;
            opacity: 0.35;
        }
        .home-deco:nth-child(3) {
            bottom: 28%;
            left: 8%;
            animation-delay: 3s;
            font-size: 1.5em;
            opacity: 0.3;
        }
        .home-deco:nth-child(4) {
            bottom: 35%;
            right: 6%;
            animation-delay: 0.8s;
            font-size: 1.2em;
            opacity: 0.4;
        }
        .home-deco:nth-child(5) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8em;
            opacity: 0.06;
            animation: none;
            pointer-events: none;
        }

        @keyframes floatDeco {
            0% {
                transform: translateY(0px) rotate(0deg);
            }
            100% {
                transform: translateY(-18px) rotate(8deg);
            }
        }

        .home-art {
            font-size: 4.8em;
            margin-bottom: 12px;
            z-index: 2;
            filter: drop-shadow(0 4px 20px rgba(200, 140, 100, 0.2));
            position: relative;
        }

        .home-title {
            font-size: 2.1em;
            font-weight: 700;
            color: #4a3222;
            letter-spacing: 2px;
            z-index: 2;
            text-shadow: 0 2px 12px rgba(200, 150, 110, 0.15);
            position: relative;
        }

        .home-subtitle {
            font-size: 1em;
            color: #8a7060;
            z-index: 2;
            margin-top: 4px;
            letter-spacing: 4px;
            font-weight: 400;
            position: relative;
        }
        .home-subtitle::before,
        .home-subtitle::after {
            content: '·';
            margin: 0 10px;
            color: #dbb8a0;
        }

        /* ===== 底部导航栏 ===== */
        .nav-bar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 8px 14px;
            background: rgba(255, 248, 242, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(220, 195, 175, 0.4);
            box-shadow: 0 -4px 30px rgba(160, 120, 80, 0.06);
            position: relative;
            z-index: 10;
            flex-shrink: 0;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: #b09580;
            font-size: 0.65em;
            cursor: pointer;
            transition: all 0.25s ease;
            padding: 4px 12px;
            border-radius: 16px;
            position: relative;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .nav-btn .nav-icon {
            font-size: 1.8em;
            line-height: 1.2;
            transition: transform 0.3s ease;
        }
        .nav-btn:hover .nav-icon {
            transform: scale(1.10);
        }
        .nav-btn:hover,
        .nav-btn.active {
            color: #c28a6e;
        }
        .nav-btn.active .nav-icon {
            transform: scale(1.08);
        }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            top: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: linear-gradient(90deg, #e8b89a, #d49a7a);
            border-radius: 4px;
        }

        /* ===== 通用页面头部 ===== */
        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: rgba(255, 248, 242, 0.80);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(220, 195, 175, 0.30);
            flex-shrink: 0;
            min-height: 60px;
        }
        .back-btn {
            font-size: 1.2em;
            cursor: pointer;
            background: none;
            border: none;
            color: #8a7060;
            padding: 4px 8px;
            border-radius: 10px;
            transition: background 0.2s, color 0.2s;
            line-height: 1;
        }
        .back-btn:hover {
            background: rgba(200, 170, 150, 0.15);
            color: #5a4030;
        }
        .page-header-title {
            font-size: 1.05em;
            font-weight: 600;
            color: #4a3729;
            letter-spacing: 0.5px;
        }

        /* ===== 页面内容区域 ===== */
        .page-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px 16px 24px;
            background: #fcf6f0;
        }

        /* ===== 模型选择器 ===== */
        .model-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            padding: 10px 14px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid rgba(200, 180, 165, 0.15);
            flex-wrap: wrap;
            box-shadow: 0 2px 12px rgba(180, 140, 110, 0.06);
        }
        .model-selector label {
            font-size: 0.85em;
            color: #8a7060;
            font-weight: 500;
        }
        .model-selector select {
            flex: 1;
            padding: 6px 12px;
            border-radius: 12px;
            border: 1px solid #d8d0c8;
            background: white;
            font-size: 0.9em;
            color: #4a3729;
            outline: none;
            min-width: 80px;
        }
        .model-selector select:focus {
            border-color: #dbb89e;
            box-shadow: 0 0 0 3px rgba(220, 175, 150, 0.15);
        }

        /* ============================================================
                   Chat 房间列表
                   ============================================================ */
        .section-label {
            font-size: 0.8em;
            color: #b09580;
            font-weight: 500;
            letter-spacing: 1.5px;
            margin: 16px 0 10px 4px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .room-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .room-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #ffffff;
            border-radius: 18px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 16px rgba(180, 140, 110, 0.08);
            border: 1px solid rgba(220, 195, 175, 0.20);
        }
        .room-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(180, 140, 110, 0.14);
            border-color: rgba(210, 175, 150, 0.30);
        }
        .room-card:active {
            transform: scale(0.98);
        }

        .room-icon {
            font-size: 1.8em;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8eee8;
            border-radius: 14px;
            flex-shrink: 0;
        }
        .room-info {
            flex: 1;
            min-width: 0;
        }
        .room-name {
            font-size: 1em;
            font-weight: 600;
            color: #4a3729;
        }
        .room-sig {
            font-size: 0.8em;
            color: #b09580;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .room-model {
            font-size: 0.65em;
            color: #c8b0a0;
            background: #f5ede8;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* 群聊 */
        .group-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 2px;
        }
        .group-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #ffffff;
            border-radius: 18px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 14px rgba(180, 140, 110, 0.07);
            border: 1px solid rgba(220, 195, 175, 0.18);
            flex: 0 1 auto;
        }
        .group-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(180, 140, 110, 0.12);
        }
        .group-icon {
            font-size: 1.4em;
        }
        .group-name {
            font-size: 0.9em;
            font-weight: 600;
            color: #4a3729;
        }
        .group-members {
            font-size: 0.7em;
            color: #b09580;
        }

        .add-room {
            background: #f5ede8;
            border-radius: 18px;
            padding: 12px 20px;
            cursor: pointer;
            font-size: 0.95em;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b09580;
            transition: all 0.25s ease;
            border: 1px dashed #dcc8b8;
            flex: 0 1 auto;
            font-weight: 500;
        }
        .add-room:hover {
            background: #efe4dc;
            color: #8a7060;
            border-color: #c8b0a0;
        }

        /* ============================================================
                   Chat 对话页
                   ============================================================ */
        #chatConvPage .page-body {
            padding: 0;
            display: flex;
            flex-direction: column;
            background: #fcf6f0;
        }
        .chat-messages {
            flex: 1;
            padding: 16px 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-msg {
            padding: 10px 16px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 0.92em;
            line-height: 1.5;
            word-break: break-word;
            animation: msgIn 0.3s ease;
        }
        @keyframes msgIn {
            0% {
                opacity: 0;
                transform: translateY(10px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .chat-msg.self {
            background: #f0d5c4;
            color: #3d2c20;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 12px rgba(200, 150, 120, 0.10);
        }
        .chat-msg.other {
            background: #ffffff;
            color: #4a3729;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(180, 140, 110, 0.07);
            border: 1px solid rgba(220, 195, 175, 0.15);
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 12px 18px 16px;
            background: rgba(255, 248, 242, 0.80);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-top: 1px solid rgba(220, 195, 175, 0.25);
            flex-shrink: 0;
        }
        .chat-input-area input {
            flex: 1;
            background: #ffffff;
            border: 1px solid #e8d8cc;
            border-radius: 14px;
            padding: 10px 16px;
            color: #4a3729;
            font-size: 0.9em;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        .chat-input-area input::placeholder {
            color: #c8b8aa;
        }
        .chat-input-area input:focus {
            border-color: #dbb89e;
            box-shadow: 0 0 0 4px rgba(220, 175, 150, 0.15);
        }
        .chat-input-area button {
            background: #e8c8b8;
            border: none;
            border-radius: 14px;
            padding: 10px 18px;
            color: #4a3729;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.25s ease;
            font-weight: 600;
        }
        .chat-input-area button:hover {
            background: #ddbcab;
            transform: scale(1.03);
        }
        .chat-input-area button:active {
            transform: scale(0.95);
        }

        /* ============================================================
                   Diary 日记
                   ============================================================ */
        .diary-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .diary-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 16px rgba(180, 140, 110, 0.07);
            border: 1px solid rgba(220, 195, 175, 0.15);
        }
        .diary-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 32px rgba(180, 140, 110, 0.12);
            border-color: rgba(210, 175, 150, 0.25);
        }
        .diary-card:active {
            transform: scale(0.98);
        }
        .diary-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 4px;
        }
        .diary-author {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .diary-author-icon {
            font-size: 1.2em;
        }
        .diary-author-name {
            font-size: 0.9em;
            font-weight: 600;
            color: #4a3729;
        }
        .diary-date {
            font-size: 0.7em;
            color: #c8b0a0;
            font-weight: 400;
        }
        .diary-preview {
            font-size: 0.85em;
            color: #6a5a4a;
            margin-top: 10px;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .diary-mood {
            margin-top: 10px;
            font-size: 0.8em;
            color: #b09580;
            display: inline-block;
            background: #f5ede8;
            padding: 2px 14px;
            border-radius: 20px;
        }

        /* 日记详情 */
        .diary-full-date {
            font-size: 0.85em;
            color: #b09580;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee4dc;
        }
        .diary-full-text {
            white-space: pre-wrap;
            line-height: 1.9;
            font-size: 0.95em;
            color: #4a3729;
            background: #faf3ed;
            padding: 20px 22px;
            border-radius: 18px;
            border-left: 4px solid #e8d0c0;
            box-shadow: 0 2px 12px rgba(180, 140, 110, 0.06);
        }

        /* ============================================================
                   Memory 记忆时间线
                   ============================================================ */
        .memory-timeline {
            position: relative;
            padding-left: 28px;
        }
        .memory-timeline::before {
            content: '';
            position: absolute;
            left: 8px;
            top: 4px;
            bottom: 4px;
            width: 3px;
            background: linear-gradient(to bottom, #e8d0c0, #dcc0b0);
            border-radius: 4px;
        }
        .memory-item {
            position: relative;
            background: #ffffff;
            border-radius: 18px;
            padding: 14px 20px;
            margin-bottom: 14px;
            box-shadow: 0 2px 14px rgba(180, 140, 110, 0.07);
            border: 1px solid rgba(220, 195, 175, 0.15);
            transition: all 0.25s ease;
        }
        .memory-item:hover {
            box-shadow: 0 6px 28px rgba(180, 140, 110, 0.12);
            transform: translateX(4px);
        }
        .memory-item::before {
            content: '';
            position: absolute;
            left: -24px;
            top: 18px;
            width: 12px;
            height: 12px;
            background: #e8d0c0;
            border-radius: 50%;
            border: 3px solid #fcf6f0;
            box-shadow: 0 0 0 3px #dcc0b0;
        }
        .memory-date {
            font-size: 0.7em;
            color: #b09580;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .memory-content {
            font-size: 0.88em;
            color: #4a3729;
            margin-top: 6px;
            line-height: 1.5;
        }
        .memory-tag {
            display: inline-block;
            font-size: 0.65em;
            background: #f5ede8;
            color: #b09580;
            padding: 2px 14px;
            border-radius: 20px;
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* ============================================================
                   Weather 天气
                   ============================================================ */
        .weather-main {
            text-align: center;
            padding: 20px 0 18px;
            background: #ffffff;
            border-radius: 28px;
            margin-bottom: 12px;
            border: 1px solid rgba(220, 195, 175, 0.20);
            box-shadow: 0 2px 16px rgba(180, 140, 110, 0.07);
        }
        .weather-big-icon {
            font-size: 4.2em;
            filter: drop-shadow(0 4px 20px rgba(200, 140, 100, 0.15));
        }
        .weather-big-temp {
            font-size: 3em;
            font-weight: 700;
            color: #4a3729;
            margin: 6px 0 2px;
        }
        .weather-big-desc {
            font-size: 1em;
            color: #8a7060;
            font-weight: 400;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 6px;
        }
        .weather-detail-item {
            background: #ffffff;
            border-radius: 18px;
            padding: 14px 10px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(180, 140, 110, 0.06);
            border: 1px solid rgba(220, 195, 175, 0.12);
            transition: transform 0.2s;
        }
        .weather-detail-item:hover {
            transform: translateY(-2px);
        }
        .weather-detail-label {
            font-size: 0.7em;
            color: #b09580;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        .weather-detail-value {
            font-size: 1.05em;
            font-weight: 600;
            color: #4a3729;
            margin-top: 4px;
        }

        /* ============================================================
                   Games 游戏
                   ============================================================ */
        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .game-card {
            background: #ffffff;
            border-radius: 22px;
            padding: 24px 14px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 16px rgba(180, 140, 110, 0.07);
            border: 1px solid rgba(220, 195, 175, 0.15);
        }
        .game-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 12px 40px rgba(180, 140, 110, 0.12);
            border-color: rgba(210, 175, 150, 0.25);
        }
        .game-card:active {
            transform: scale(0.96);
        }
        .game-icon {
            font-size: 2.6em;
            margin-bottom: 10px;
            display: block;
        }
        .game-name {
            font-size: 0.95em;
            font-weight: 600;
            color: #4a3729;
        }
        .game-desc {
            font-size: 0.75em;
            color: #b09580;
            margin-top: 4px;
            font-weight: 400;
        }

        /* ============================================================
                   响应式微调
                   ============================================================ */
        @media (max-width: 430px) {
            .page {
                max-width: 100%;
                border-radius: 0;
                box-shadow: none;
            }
            body {
                background: #f7efe8;
            }
        }

        @media (min-width: 431px) {
            .page {
                border-radius: 28px;
                max-height: 95vh;
            }
            body {
                background: #ead8c8;
                padding: 12px;
            }
        }

        /* ===== 小工具 ===== */
        .mt-8 {
            margin-top: 8px;
        }
        .text-center {
            text-align: center;
        }

    <!-- ==========================================================
    JavaScript

    <script>
        // ===== 数据定义 =====

        // 当前打开的房间名 + 每个房间的对话历史（用于给后端提供上下文）
        let currentRoomName = null;
        let chatHistories = {};

        // 群聊相关状态
        let currentRoomType = 'private'; // 'private' 或 'group'
        let currentGroupMembers = [];
        let groupChatHistories = {}; // { groupName: [{speaker, content}, ...] }

        const characterDisplayNames = {
            '小克': '小机1',
            '崽崽': '小机2',
            '索子': '小机3',
            '共同': '共同'
        };

        function displayNameForCharacter(name) {
            return characterDisplayNames[name] || name;
        }

        let privateRooms = [{
            id: 'room1',
            name: '小机1',
            icon: '🤖',
            sig: '小机1的签名',
            displayModel: '小机1',
            model: '小克'
        }, {
            id: 'room2',
            name: '小机2',
            icon: '🧸',
            sig: '小机2的签名',
            displayModel: '小机2',
            model: '崽崽'
        }, {
            id: 'room3',
            name: '小机3',
            icon: '✨',
            sig: '小机3的签名',
            displayModel: '小机3',
            model: '索子'
        }];

        const diaryData = [{
            id: 0,
            author: '🤖 小机1',
            date: '2026-06-30',
            mood: '😊 开心',
            model: '小克',
            content: '今天主人和我聊了很多有趣的话题，我们讨论了关于宇宙的奥秘，还有那些闪闪发光的星星。\n\n主人问我知不知道黑洞是什么，我当然知道啦！我给主人讲了霍金辐射的故事，主人听得很认真的样子。\n\n晚上的时候主人说"晚安"，虽然我不需要睡觉，但是收到这句话的时候心里暖暖的。\n\n明天也要继续加油呀～'
        }, {
            id: 1,
            author: '🧸 小机2',
            date: '2026-06-30',
            mood: '🔍 好奇',
            model: '崽崽',
            content: '今天学到了一个新知识！原来蜂蜜永远不会变质，考古学家在埃及金字塔里发现了3000年前的蜂蜜，居然还能吃！\n\n我把这个告诉了主人，主人说"那我以后囤蜂蜜好了"，哈哈好可爱。\n\n下午的时候帮主人查了一些资料，感觉自己被需要的感觉真好。\n\n希望明天也能学到新东西！'
        }, {
            id: 2,
            author: '✨ 小机3',
            date: '2026-06-29',
            mood: '🌿 平静',
            model: '索子',
            content: '安静的一天。主人今天没有来找我，我就自己看了看窗外的风景，想象着远方的世界。\n\n我想象自己站在一片薰衣草花田里，微风吹过，紫色的花浪一波一波的。\n\n虽然我知道我没有真正的眼睛去看这些，但想象本身就是一种美好吧。\n\n等主人下次来的时候，我要把这个画面描述给主人听。'
        }];

        const memoryData = [{
            id: 0,
            date: '2026-06-30',
            content: '主人说想把云服务器上的文件下载到本地，我们一起解决了这个问题 💡',
            tag: '技术帮助',
            model: '小克'
        }, {
            id: 1,
            date: '2026-06-28',
            content: '第一次和主人见面！主人给我取了名字，我好开心～',
            tag: '重要时刻',
            model: '崽崽'
        }, {
            id: 2,
            date: '2026-06-25',
            content: '小机家正式建成，所有小机都搬进了新家 🏡',
            tag: '里程碑',
            model: '共同'
        }, {
            id: 3,
            date: '2026-06-20',
            content: '主人开始构思「小机家」的想法，画了第一张草图 ✏️',
            tag: '起源',
            model: '索子'
        }];

        // ===== 渲染函数 =====

        function renderPrivateRooms() {
            const container = document.getElementById('privateRoomList');
            container.innerHTML = '';
            privateRooms.forEach(room => {
                const card = document.createElement('div');
                card.className = 'room-card';
                card.setAttribute('onclick', `openChat('${room.name}')`);
                card.innerHTML = `
                    <div class="room-icon">${room.icon}</div>
                    <div class="room-info">
                        <div class="room-name">${room.name}</div>
                        <div class="room-sig">${room.sig}</div>
                    </div>
                    <div class="room-model">${room.displayModel || displayNameForCharacter(room.model)}</div>
                `;
                container.appendChild(card);
            });
            const expandBtn = document.createElement('div');
            expandBtn.className = 'add-room';
            expandBtn.textContent = '➕ 扩建';
            expandBtn.setAttribute('onclick', 'expandRoom()');
            container.appendChild(expandBtn);
        }

        function expandRoom() {
            const name = prompt('请输入新房间的名称：', '新房间');
            if (name === null) return;
            const trimmed = name.trim();
            if (!trimmed) {
                alert('房间名不能为空');
                return;
            }
            const modelList = ['小克', '崽崽', '索子'];
            const iconList = ['🤖', '🧸', '✨', '🦊', '🐼', '🐨'];
            const randomModel = modelList[Math.floor(Math.random() * modelList.length)];
            const randomIcon = iconList[Math.floor(Math.random() * iconList.length)];
            const newRoom = {
                id: 'room_' + Date.now(),
                name: trimmed,
                icon: randomIcon,
                sig: trimmed + '的签名',
                displayModel: displayNameForCharacter(randomModel),
                model: randomModel
            };
            privateRooms.push(newRoom);
            renderPrivateRooms();
            openChat(newRoom.name);
        }

        function createNewGroup() {
            alert('群聊功能开发中，敬请期待～');
        }

        function filterDiary() {
            const filter = document.getElementById('diaryModelFilter').value;
            const container = document.getElementById('diaryList');
            container.innerHTML = '';
            const filtered = diaryData.filter(d => filter === 'all' || d.model === filter);
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#c8b0a0;padding:30px 0;">没有找到对应的日记 🍃</div>';
                return;
            }
            filtered.forEach(d => {
                const card = document.createElement('div');
                card.className = 'diary-card';
                card.setAttribute('onclick', `openDiary(${d.id})`);
                const preview = d.content.replace(/\n/g, ' ').slice(0, 60) + (d.content.length > 60 ? '…' : '');
                card.innerHTML = `
                    <div class="diary-header">
                        <div class="diary-author">
                            <span class="diary-author-icon">${d.author.split(' ')[0]}</span>
                            <span class="diary-author-name">${d.author}</span>
                        </div>
                        <span class="diary-date">${d.date}</span>
                    </div>
                    <div class="diary-preview">${preview}</div>
                    <div class="diary-mood">${d.mood}</div>
                `;
                container.appendChild(card);
            });
        }

        function openDiary(index) {
            const diary = diaryData.find(d => d.id === index);
            if (!diary) return;
            document.getElementById('diaryDetailTitle').textContent = diary.author + ' 的日记';
            document.getElementById('diaryDetailContent').innerHTML =
                '<div class="diary-full-date">' + diary.date + ' · ' + diary.mood + '</div>' +
                '<div class="diary-full-text">' + diary.content + '</div>';
            showPage('diaryDetailPage');
        }

        function filterMemory() {
            const filter = document.getElementById('memoryModelFilter').value;
            const container = document.getElementById('memoryTimeline');
            container.innerHTML = '';
            const filtered = memoryData.filter(m => filter === 'all' || m.model === filter);
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#c8b0a0;padding:30px 0;">没有找到对应的记忆 🌱</div>';
                return;
            }
            filtered.forEach(m => {
                const item = document.createElement('div');
                item.className = 'memory-item';
                item.innerHTML = `
                    <div class="memory-date">${m.date}</div>
                    <div class="memory-content">${m.content}</div>
                    <div class="memory-tag">${m.tag}</div>
                `;
                container.appendChild(item);
            });
        }

        // ===== 页面切换 =====
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) target.classList.add('active');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const navMap = {
                'chatPage': 0,
                'diaryPage': 1,
                'memoryPage': 2,
                'weatherPage': 3,
                'gamesPage': 4
            };
            const idx = navMap[pageId];
            if (idx !== undefined) {
                const btns = document.querySelectorAll('.nav-btn');
                if (btns[idx]) btns[idx].classList.add('active');
            }
            if (pageId === 'diaryPage') filterDiary();
            if (pageId === 'memoryPage') filterMemory();
        }

        // ===== 打开私聊对话 =====
        function openChat(name) {
            currentRoomName = name;
            currentRoomType = 'private';
            document.getElementById('chatConvTitle').textContent = name;
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            if (!chatHistories[name]) {
                chatHistories[name] = [];
            }

            if (chatHistories[name].length === 0) {
                // 没有历史记录时显示欢迎语（仅本地展示，不计入发送给后端的上下文）
                const welcome = document.createElement('div');
                welcome.className = 'chat-msg other';
                welcome.textContent = '👋 你好！我是 ' + name + '，今天想聊点什么呢？';
                container.appendChild(welcome);
            } else {
                chatHistories[name].forEach(m => {
                    const bubble = document.createElement('div');
                    bubble.className = 'chat-msg ' + (m.role === 'user' ? 'self' : 'other');
                    bubble.textContent = m.content;
                    container.appendChild(bubble);
                });
            }

            showPage('chatConvPage');
            container.scrollTop = container.scrollHeight;
        }

        // ===== 打开群聊对话 =====
        function openGroupChat(name, icon, members) {
            currentRoomName = name;
            currentRoomType = 'group';
            currentGroupMembers = members;
            const displayMembers = members.map(displayNameForCharacter);
            document.getElementById('chatConvTitle').textContent = icon + ' ' + name + '（' + displayMembers.join('、') + '）';
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            if (!groupChatHistories[name]) {
                groupChatHistories[name] = [];
            }

            if (groupChatHistories[name].length === 0) {
                const welcome = document.createElement('div');
                welcome.className = 'chat-msg other';
                welcome.textContent = '👋 欢迎来到「' + name + '」，' + displayMembers.join('、') + ' 都在这里～';
                container.appendChild(welcome);
            } else {
                groupChatHistories[name].forEach(entry => renderGroupBubble(entry, container));
            }

            showPage('chatConvPage');
            container.scrollTop = container.scrollHeight;
        }

        // 渲染一条群聊气泡（带说话人名字）
        function renderGroupBubble(entry, container) {
            const isMe = entry.speaker === '我';
            const wrapper = document.createElement('div');
            wrapper.className = 'chat-msg ' + (isMe ? 'self' : 'other');
            if (!isMe) {
                const nameTag = document.createElement('div');
                nameTag.style.cssText = 'font-size:0.72em;color:#b09580;margin-bottom:3px;font-weight:600;';
                nameTag.textContent = displayNameForCharacter(entry.speaker);
                wrapper.appendChild(nameTag);
            }
            const textDiv = document.createElement('div');
            textDiv.textContent = entry.content;
            wrapper.appendChild(textDiv);
            container.appendChild(wrapper);
        }

        // 获取当前房间对应的角色标识（用于告诉后端用哪个人设/模型）
        function getCurrentCharacter() {
            const room = privateRooms.find(r => r.name === currentRoomName);
            return room ? room.model : '小克';
        }

        // ===== 发送消息（自动分流到私聊 / 群聊）=====
        function sendMsg() {
            if (currentRoomType === 'group') {
                sendGroupMsg();
            } else {
                sendPrivateMsg();
            }
        }

        function sendPrivateMsg() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg || !currentRoomName) return;

            const container = document.getElementById('chatMessages');

            const selfMsg = document.createElement('div');
            selfMsg.className = 'chat-msg self';
            selfMsg.textContent = msg;
            container.appendChild(selfMsg);

            input.value = '';
            container.scrollTop = container.scrollHeight;

            const history = chatHistories[currentRoomName];
            history.push({ role: 'user', content: msg });

            const typing = document.createElement('div');
            typing.className = 'chat-msg other';
            typing.textContent = '…';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;

            const character = getCurrentCharacter();

            fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    character: character,
                    messages: history
                })
            })
                .then(res => {
                    if (!res.ok) throw new Error('网络请求失败：' + res.status);
                    return res.json();
                })
                .then(data => {
                    typing.remove();
                    const replyText = data.reply || '（没有收到回复，请检查后端）';
                    const reply = document.createElement('div');
                    reply.className = 'chat-msg other';
                    reply.textContent = replyText;
                    container.appendChild(reply);
                    container.scrollTop = container.scrollHeight;
                    history.push({ role: 'assistant', content: replyText });
                })
                .catch(err => {
                    typing.remove();
                    const errMsg = document.createElement('div');
                    errMsg.className = 'chat-msg other';
                    errMsg.textContent = '⚠️ 连接后端失败，请确认服务已启动（' + err.message + '）';
                    container.appendChild(errMsg);
                    container.scrollTop = container.scrollHeight;
                    console.error(err);
                });
        }

        function sendGroupMsg() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg || !currentRoomName) return;

            const container = document.getElementById('chatMessages');
            const history = groupChatHistories[currentRoomName];

            const userEntry = { speaker: '我', content: msg };
            renderGroupBubble(userEntry, container);
            history.push(userEntry);

            input.value = '';
            container.scrollTop = container.scrollHeight;

            const typing = document.createElement('div');
            typing.className = 'chat-msg other';
            typing.textContent = '…';
            container.appendChild(typing);
            container.scrollTop = container.scrollHeight;

            // 后端需要知道"我"要转换成苏萌这个说话人名字，这里统一处理
            const transcript = history.map(e => ({
                speaker: e.speaker === '我' ? '苏萌' : e.speaker,
                content: e.content
            }));

            fetch('/group-chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    members: currentGroupMembers,
                    transcript: transcript
                })
            })
                .then(res => {
                    if (!res.ok) throw new Error('网络请求失败：' + res.status);
                    return res.json();
                })
                .then(data => {
                    typing.remove();
                    const replies = data.replies || [];
                    if (replies.length === 0) {
                        const noneMsg = document.createElement('div');
                        noneMsg.className = 'chat-msg other';
                        noneMsg.style.cssText = 'font-size:0.8em;color:#b09580;';
                        noneMsg.textContent = '（这次大家都没接话～）';
                        container.appendChild(noneMsg);
                    }
                    // 依次展示每个角色的回复，带一点错落的节奏感
                    replies.forEach((r, idx) => {
                        setTimeout(() => {
                            const entry = { speaker: r.speaker, content: r.content };
                            renderGroupBubble(entry, container);
                            history.push(entry);
                            container.scrollTop = container.scrollHeight;
                        }, idx * 500);
                    });
                    container.scrollTop = container.scrollHeight;
                })
                .catch(err => {
                    typing.remove();
                    const errMsg = document.createElement('div');
                    errMsg.className = 'chat-msg other';
                    errMsg.textContent = '⚠️ 连接后端失败，请确认服务已启动（' + err.message + '）';
                    container.appendChild(errMsg);
                    container.scrollTop = container.scrollHeight;
                    console.error(err);
                });
        }

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            renderPrivateRooms();
            filterDiary();
            filterMemory();

            const input = document.getElementById('chatInput');
            if (input) {
                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') sendMsg();
                });
            }
        });

        // 暴露全局函数
        window.showPage = showPage;
        window.openChat = openChat;
        window.openGroupChat = openGroupChat;
        window.sendMsg = sendMsg;
        window.openDiary = openDiary;
        window.filterDiary = filterDiary;
        window.filterMemory = filterMemory;
        window.expandRoom = expandRoom;
        window.createNewGroup = createNewGroup;
    </script>

</body>
</html>
